<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RepoMind</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --surface: #12161f;
    --surface2: #1a1f2e;
    --border: #232840;
    --accent: #4f7cff;
    --accent2: #7c3aed;
    --green: #22d3a5;
    --red: #f87171;
    --amber: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .logo-text span { color: var(--accent); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    margin-left: auto;
    transition: background 0.3s;
  }
  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-label {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 340px 1fr;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 61px);
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
  }
  .input-group { margin-bottom: 0.75rem; }
  .input-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
    display: block;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 0.65rem 1rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #3d6bff; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Progress */
  .progress-wrap {
    margin-top: 0.75rem;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* Index history */
  .index-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.6rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 0.25rem;
  }
  .index-item:hover { background: var(--surface2); }
  .index-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }
  .index-icon { font-size: 14px; }
  .index-name {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .index-chunks {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--border);
    padding: 1px 6px;
    border-radius: 99px;
  }
  .empty-state {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 1rem 0;
  }

  /* ── Chat Area ── */
  .chat-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 1rem;
    color: var(--muted);
    text-align: center;
    padding: 3rem;
  }
  .welcome-icon { font-size: 3rem; opacity: 0.4; }
  .welcome h2 {
    font-family: var(--mono);
    font-size: 1rem;
    color: var(--text);
    opacity: 0.5;
  }
  .welcome p { font-size: 0.85rem; max-width: 340px; line-height: 1.6; }

  /* Messages */
  .message { display: flex; flex-direction: column; gap: 0.35rem; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-role {
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .msg-role.user { color: var(--accent); }
  .msg-role.assistant { color: var(--green); }

  .msg-bubble {
    padding: 0.9rem 1.1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.7;
    max-width: 820px;
  }
  .msg-bubble.user {
    background: var(--surface2);
    border: 1px solid var(--border);
    align-self: flex-end;
  }
  .msg-bubble.assistant {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  /* Sources */
  .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.6rem;
  }
  .source-chip {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .source-chip .sim {
    color: var(--green);
    font-size: 0.65rem;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0.9rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: fit-content;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input bar */
  .chat-input-bar {
    padding: 1rem 2rem 1.25rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .chat-input-wrap {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.75rem;
    transition: border-color 0.2s;
  }
  .chat-input-wrap:focus-within { border-color: var(--accent); }
  #chatInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.9rem;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #chatInput::placeholder { color: var(--muted); }
  .send-btn {
    width: 34px; height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #3d6bff; }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .input-hint {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.4rem;
    text-align: center;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.8rem;
    display: flex; align-items: center; gap: 0.5rem;
    animation: slideIn 0.25s ease;
    z-index: 999;
    max-width: 320px;
  }
  .toast.success { background: #0d2b22; border: 1px solid var(--green); color: var(--green); }
  .toast.error   { background: #2b0d0d; border: 1px solid var(--red);   color: var(--red); }
  .toast.info    { background: #0d1a2b; border: 1px solid var(--accent); color: var(--accent); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar overall */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div class="logo-text">Repo<span>Mind</span></div>
  </div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:0.5rem;">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">checking...</span>
  </div>
</header>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Config -->
    <div class="sidebar-section">
      <div class="section-label">⚙ config</div>
      <div class="input-group">
        <label class="input-label">API Server URL</label>
        <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000"/>
      </div>
      <button class="btn btn-ghost" onclick="checkHealth()" style="margin-top:0.25rem;">
        ↺ Check connection
      </button>
    </div>

    <!-- Index -->
    <div class="sidebar-section">
      <div class="section-label">📁 index codebase</div>
      <div class="input-group">
        <label class="input-label">Repo path (absolute)</label>
        <input type="text" id="repoPath" placeholder="/Users/you/Desktop/myproject"/>
      </div>
      <button class="btn btn-primary" id="indexBtn" onclick="indexRepo()">
        ⚡ Index Codebase
      </button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Indexing...</div>
      </div>
    </div>

    <!-- Indexed repos -->
    <div class="sidebar-section" style="flex:1;">
      <div class="section-label">🗂 indexed repos</div>
      <div id="indexList">
        <div class="empty-state">No repos indexed yet</div>
      </div>
    </div>

  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="chat-messages" id="chatMessages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🧠</div>
        <h2>Ask your codebase anything</h2>
        <p>Index a repo using the sidebar, then ask questions in plain English.</p>
      </div>
    </div>

    <div class="chat-input-bar">
      <div class="chat-input-wrap">
        <textarea id="chatInput" rows="1" placeholder="Where is rate limiting handled? How does auth work?..."
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

</div>

<script>
  const state = {
    apiUrl: 'http://localhost:8000',
    indexedRepos: [],
    activeRepo: null,
    isIndexing: false,
    isAsking: false,
  };

  const STORAGE_KEY = 'repomind-indexed-repos';

  function loadIndexedRepos() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      state.indexedRepos = parsed.indexedRepos || [];
      const activePath = parsed.activePath;
      if (activePath) {
        state.activeRepo = state.indexedRepos.find(r => r.path === activePath) || null;
      }
    } catch (e) {
      console.warn('Failed to load cached repos', e);
    }
  }

  function persistIndexedRepos() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        indexedRepos: state.indexedRepos,
        activePath: state.activeRepo ? state.activeRepo.path : null,
      }));
    } catch (e) {
      console.warn('Failed to persist repos', e);
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────────────

  function getApiUrl() {
    return document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
  }

  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function setStatus(online) {
    const dot = document.getElementById('statusDot');
    const label = document.getElementById('statusLabel');
    dot.className = 'status-dot' + (online ? ' online' : '');
    label.textContent = online ? 'server online' : 'server offline';
    label.style.color = online ? 'var(--green)' : 'var(--muted)';
  }

  // ── Health check ─────────────────────────────────────────────────────────

  async function checkHealth() {
    try {
      const res = await fetch(getApiUrl() + '/health');
      setStatus(res.ok);
      if (res.ok) toast('✓ Connected to RepoMind server', 'success');
      else toast('Server returned an error', 'error');
    } catch {
      setStatus(false);
      toast('Cannot reach server — is it running?', 'error');
    }
  }

  // ── Index repo ────────────────────────────────────────────────────────────

  async function indexRepo() {
    const path = document.getElementById('repoPath').value.trim();
    if (!path) { toast('Enter a repo path first', 'error'); return; }
    if (state.isIndexing) return;

    state.isIndexing = true;
    const btn = document.getElementById('indexBtn');
    const wrap = document.getElementById('progressWrap');
    const fill = document.getElementById('progressFill');
    const text = document.getElementById('progressText');

    btn.disabled = true;
    btn.textContent = '⏳ Indexing...';
    wrap.classList.add('visible');

    // Animate progress bar (fake progress while waiting)
    let pct = 0;
    const interval = setInterval(() => {
      pct = Math.min(pct + Math.random() * 8, 85);
      fill.style.width = pct + '%';
      text.textContent = `Indexing... ${Math.round(pct)}%`;
    }, 400);

    try {
      const res = await fetch(getApiUrl() + '/index', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repo_path: path }),
      });
      clearInterval(interval);

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Indexing failed');
      }

      const data = await res.json();
      fill.style.width = '100%';
      text.textContent = `Done! ${data.chunks_indexed} chunks indexed`;

      const repoName = path.split('/').pop() || path;
      const entry = { name: repoName, path, chunks: data.chunks_indexed };
      state.indexedRepos.unshift(entry);
      state.activeRepo = entry;
      renderIndexList();
      persistIndexedRepos();

      toast(`✓ Indexed ${data.chunks_indexed} chunks from ${repoName}`, 'success');
      hideWelcome();

      setTimeout(() => { wrap.classList.remove('visible'); fill.style.width = '0%'; }, 2000);

    } catch (e) {
      clearInterval(interval);
      fill.style.width = '0%';
      wrap.classList.remove('visible');
      toast('Error: ' + e.message, 'error');
    } finally {
      state.isIndexing = false;
      btn.disabled = false;
      btn.textContent = '⚡ Index Codebase';
    }
  }

  // ── Index list ────────────────────────────────────────────────────────────

  function renderIndexList() {
    const list = document.getElementById('indexList');
    if (!state.indexedRepos.length) {
      list.innerHTML = '<div class="empty-state">No repos indexed yet</div>';
      return;
    }
    list.innerHTML = state.indexedRepos.map((r, i) => `
      <div class="index-item ${state.activeRepo === r ? 'active' : ''}" onclick="selectRepo(${i})">
        <span class="index-icon">📦</span>
        <span class="index-name" title="${r.path}">${r.name}</span>
        <span class="index-chunks">${r.chunks}</span>
      </div>
    `).join('');
  }

  function selectRepo(i) {
    state.activeRepo = state.indexedRepos[i];
    renderIndexList();
    persistIndexedRepos();
    toast(`Switched to ${state.activeRepo.name}`, 'info');
  }

  // ── Chat ──────────────────────────────────────────────────────────────────

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMessage(role, text, sources = []) {
    hideWelcome();
    const wrap = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message';

    const roleEl = document.createElement('div');
    roleEl.className = `msg-role ${role}`;
    roleEl.textContent = role === 'user' ? '▸ you' : '▸ repomind';

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${role}`;
    bubble.style.whiteSpace = 'pre-wrap';
    bubble.textContent = text;

    div.appendChild(roleEl);
    div.appendChild(bubble);

    if (sources.length) {
      const src = document.createElement('div');
      src.className = 'sources';
      sources.forEach(s => {
        const chip = document.createElement('div');
        chip.className = 'source-chip';
        chip.innerHTML = `📄 ${s.file}:L${s.lines} <span class="sim">${s.similarity}</span>`;
        src.appendChild(chip);
      });
      div.appendChild(src);
    }

    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function showTyping() {
    hideWelcome();
    const wrap = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message';
    div.id = 'typingIndicator';

    const roleEl = document.createElement('div');
    roleEl.className = 'msg-role assistant';
    roleEl.textContent = '▸ repomind';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    div.appendChild(roleEl);
    div.appendChild(typing);
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const question = input.value.trim();
    if (!question || state.isAsking) return;

    if (!state.activeRepo) {
      toast('Index a repo first using the sidebar', 'error');
      return;
    }

    state.isAsking = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', question);
    showTyping();

    try {
      const res = await fetch(getApiUrl() + '/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, top_k: 5 }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Request failed');
      }

      const data = await res.json();
      appendMessage('assistant', data.answer, data.sources);

    } catch (e) {
      removeTyping();
      appendMessage('assistant', '⚠ Error: ' + e.message);
    } finally {
      state.isAsking = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('chatInput').focus();
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadIndexedRepos();
  renderIndexList();
  checkHealth();
  setInterval(checkHealth, 30000);
</script>
</body>
</html>
